services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - '3000:3000'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - '8080:80'
    restart: unless-stopped

