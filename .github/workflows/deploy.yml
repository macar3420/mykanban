# Deploy to your server (requires a self-hosted GitHub Actions runner on the VM)
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-mykanban
  cancel-in-progress: true

env:
  WORK_DIR: /home/macar/apps/mykanban
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  deploy:
    name: Deploy on server
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      # Native git avoids downloading actions/checkout (often times out on slow EC2)
      - name: Checkout
        env:
          REPO_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin https://github.com/macar3420/mykanban.git
          git fetch --depth 1 origin "$REPO_SHA"
          git checkout FETCH_HEAD

      - name: Prepare work directory
        run: mkdir -p "$WORK_DIR"

      - name: Sync repository
        run: |
          rsync -az --delete --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'backend/node_modules' \
            --exclude '.github' \
            ./ "$WORK_DIR"/

      - name: Pull images and start with Docker Compose
        working-directory: ${{ env.WORK_DIR }}
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # write env file from GitHub secret (if exists)
          if [ -n "${APP_ENV_FILE:-}" ]; then
            printf '%s' "$APP_ENV_FILE" > .env
          fi

          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          export IMAGE_TAG

          COMPOSE="docker-compose -f ${COMPOSE_FILE}"
          test -f "${COMPOSE_FILE}"

          # Production stack only (mysql + backend:3001 + frontend:8083)
          $COMPOSE down --remove-orphans || true
          $COMPOSE pull
          $COMPOSE up -d

          docker image prune -f || true

      - name: Health check
        run: |
          sleep 5
          curl -fsS http://localhost:3001/health