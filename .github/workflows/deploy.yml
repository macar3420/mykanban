# Deploy to your server (requires a self-hosted GitHub Actions runner on the VM)
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-mykanban
  cancel-in-progress: true

env:
  WORK_DIR: /home/macar/apps/mykanban

jobs:
  deploy:
    name: Deploy on server
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare work directory
        run: mkdir -p "$WORK_DIR"

      - name: Sync repository
        run: |
          rsync -az --delete --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'backend/node_modules' \
            --exclude '.github' \
            ./ "$WORK_DIR"/

      - name: Build and start with Docker Compose
        working-directory: ${{ env.WORK_DIR }}
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -n "${APP_ENV_FILE:-}" ]; then
            printf '%s' "$APP_ENV_FILE" > .env
          fi
          docker compose -f docker-compose.prod.yml down --remove-orphans || true
          docker compose -f docker-compose.prod.yml up -d --build
          docker image prune -f || true

      - name: Health check
        run: |
          sleep 5
          curl -fsS http://localhost:3001/health
